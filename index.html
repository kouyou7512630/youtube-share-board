<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流星会</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <script type="module" src="app.js" defer></script>
</head>
<body>

  <!-- ログインフォーム -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h2>パスワードを入力してください</h2>
      <input type="password" id="passwordInput" placeholder="パスワード">
      <button onclick="checkPassword()">ログイン</button>
    </div>
  </div>

  <!-- サイトコンテンツ（ログイン後に表示される） -->
  <div id="siteContent" style="display: none;">
    <header>
      <h1>流星会 <i class="fas fa-basketball-ball"></i></h1>
    </header>

    <div class="container">
      <div class="controls">
        <input type="date" id="date">
        <input type="text" id="url" placeholder="YouTube URL">
        <input type="text" id="comment" placeholder="コメント">
        <button onclick="addVideo()">投稿</button>
      </div>

      <h2>📅 カレンダー</h2>
      <div id="calendar"></div>

      <h2 id="selectedDate">すべての動画</h2>
      <div id="videoList"></div>
    </div>
  </div>

</body>
</html>
