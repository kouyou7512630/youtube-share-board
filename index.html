<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流星会</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>

<body>

<header>
  <h1>
    <span class="text">流星会</span>
    <i class="fas fa-basketball-ball"></i>
  </h1>
</header>

<div class="container">

  <div class="controls">
    <input type="date" id="date">
    <input type="text" id="url" placeholder="YouTube URL">
    <input type="text" id="comment" placeholder="コメント">
    <button onclick="addVideo()">投稿</button>
  </div>

  <h2>📅 カレンダー</h2>
  <div id="calendar"></div>

  <div class="filterButtons">
    <button onclick="showAllVideos()">すべての動画</button>
    <button onclick="showSelectedVideos()">選択日の動画</button>
  </div>

  <h2 id="selectedDate">すべての動画</h2>
  <div id="videoList"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
